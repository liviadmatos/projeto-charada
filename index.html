<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts e ícones para dar cara de jogo -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>🎮 Gerador de Charadas | Jogo</title>
    <style>
        /* Estilos extras que NÃO interferem nos IDs/classes originais do script */
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2f 100%);
            font-family: 'Inter', sans-serif;
            position: relative;
        }
        /* grid de fundo estilo game */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 35px 35px;
            pointer-events: none;
            z-index: 0;
        }
        .stats-card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
        }
        .card-shadow {
            box-shadow: 0 25px 40px -12px black, 0 0 0 2px rgba(0, 255, 255, 0.3) inset, 0 0 15px cyan;
        }
        .btn-glow {
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .btn-glow:active {
            transform: scale(0.96);
        }
        .neon-text {
            text-shadow: 0 0 5px cyan, 0 0 10px #00aaff;
        }
        .badge {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border-radius: 40px;
        }
        footer i {
            filter: drop-shadow(0 0 4px cyan);
        }
        /* pequena animação no timer */
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 2px cyan; }
            100% { text-shadow: 0 0 10px cyan; }
        }
        #timer {
            animation: pulseGlow 1.2s infinite alternate;
        }
        /* responsivo manter cartão firme */
        @media (max-width: 640px) {
            .stats-card span, .stats-card div { font-size: 0.9rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 relative z-10">

    <!-- Painel de estatísticas com cara de arcade (IDs inalterados) -->
    <div class="stats-card flex flex-wrap justify-center gap-6 md:gap-10 p-3 px-6 rounded-full mb-6 shadow-2xl border border-cyan-400/60">
        <div class="flex items-center gap-2 text-green-300 font-extrabold text-lg md:text-xl">
            <i class="fas fa-trophy text-yellow-400"></i>
            <span>ACERTOS</span>
            <span id="acertos" class="bg-black/70 px-3 py-1 rounded-full font-mono text-xl text-green-300 min-w-[50px] text-center">0</span>
        </div>
        <div class="flex items-center gap-2 text-cyan-300 font-extrabold text-lg md:text-xl">
            <i class="fas fa-hourglass-half animate-pulse text-cyan-200"></i>
            <span>TEMPO</span>
            <span id="timer" class="bg-black/70 px-3 py-1 rounded-full font-mono text-xl text-cyan-300 min-w-[85px] text-center">00:00</span>
        </div>
        <div class="flex items-center gap-2 text-red-300 font-extrabold text-lg md:text-xl">
            <i class="fas fa-skull"></i>
            <span>ERROS</span>
            <span id="erros" class="bg-black/70 px-3 py-1 rounded-full font-mono text-xl text-red-300 min-w-[50px] text-center">0</span>
        </div>
    </div>

    <!-- Título com estilo gamer e neon -->
    <h1 class="text-3xl md:text-4xl font-black mb-3 text-center tracking-wider bg-gradient-to-r from-cyan-300 via-blue-400 to-purple-400 bg-clip-text text-transparent drop-shadow-lg" style="font-family: 'Press Start 2P', cursive; font-size: 1.5rem; text-shadow: 0 0 5px rgba(0,255,255,0.5);">
        <i class="fas fa-gamepad mr-2 text-cyan-300"></i> GERADOR DE CHARADAS
    </h1>
    <p class="text-cyan-200/90 text-sm mb-6 font-semibold tracking-wide"> Vire o card, responda, vença o tempo!</p>

    <!-- CARTÃO FLIP (mantém exatamente os mesmos IDs e classes que o script usa) -->
    <div class="group w-full max-w-sm [perspective:1000px] h-64 md:h-72">
        <div id="card-inner" class="relative w-full h-full transition-all duration-500 [transform-style:preserve-3d] cursor-pointer shadow-2xl rounded-2xl card-shadow">
            <!-- FRENTE: PERGUNTA -->
            <div class="absolute inset-0 [backface-visibility:hidden] bg-gradient-to-br from-indigo-900 via-slate-800 to-indigo-950 rounded-2xl flex flex-col items-center justify-center p-6 text-center border-2 border-cyan-400/70">
                <span class="text-cyan-200 font-black uppercase tracking-widest text-xs mb-2 bg-black/50 px-3 py-1 rounded-full"><i class="fas fa-question-circle mr-1"></i> PERGUNTA</span>
                <p id="pergunta" class="text-xl font-bold text-white leading-relaxed drop-shadow-md">Carregando charada...</p>
                <div class="mt-4 flex items-center gap-2 text-gray-300 text-xs bg-black/30 px-3 py-1 rounded-full">
                    <i class="fas fa-hand-pointer"></i>
                    <span>clique para virar</span>
                </div>
            </div>
            <!-- VERSO -->
            <div class="absolute inset-0 [backface-visibility:hidden] bg-gradient-to-br from-indigo-900 via-slate-800 to-indigo-950 rounded-2xl flex flex-col items-center justify-center p-6 text-center text-white [transform:rotateY(180deg)] border-2 border-cyan-400/70">
                <span class="text-cyan-200 font-black uppercase tracking-widest text-xs mb-2 bg-black/50 px-3 py-1 rounded-full"><i class="fas fa-lightbulb mr-1"></i> RESPOSTA</span>
                <p id="resposta" class="text-xl font-bold text-white leading-relaxed drop-shadow-md bg-black/40 px-3 py-2 rounded-xl shadow-inner"></p>
                <div class="flex gap-4 mt-5 flex-wrap justify-center">
                    <button onclick="marcarPonto(true)" class="bg-green-600 hover:bg-green-500 px-5 py-2 rounded-xl font-black shadow-lg transition-all active:scale-95 flex items-center gap-2 text-white"><i class="fas fa-check-circle"></i> Acertei </button>
                    <button onclick="marcarPonto(false)" class="bg-red-600 hover:bg-red-500 px-5 py-2 rounded-xl font-black shadow-lg transition-all active:scale-95 flex items-center gap-2 text-white"><i class="fas fa-times-circle"></i> Errei </button>
                </div>
            
            </div>
        </div>
    </div>

    <!-- Botões principais: id="btn-nova" usado no script, e onclicks mantidos -->
    <button id="btn-nova" class="mt-8 bg-gradient-to-r from-cyan-600 to-blue-700 hover:from-cyan-500 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-full transition-all active:scale-95 shadow-lg flex items-center gap-2 text-lg tracking-wide">
        <i class="fas fa-dice-d6"></i> PRÓXIMA CHARADA 🎲
    </button>

    <button onclick="finalizarJogo()" class="mt-3 text-gray-300 hover:text-red-300 underline text-sm transition-all bg-black/30 px-4 py-1 rounded-full backdrop-blur-sm flex items-center gap-1">
        <i class="fas fa-flag-checkered"></i> Finalizar Jogo
    </button>

   

    <footer class="mt-5 text-[10px] text-cyan-300/60 text-center max-w-md flex items-center gap-1 justify-center">
        <i class="fas fa-microchip"></i> Desenvolvido por Lívia 
    </footer>

    <script src="script.js"></script>
</body>
</html>
